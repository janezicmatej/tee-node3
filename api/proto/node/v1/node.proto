syntax = "proto3";  

package node.v1;  
option go_package = "tee-node/gen/go/node/v1;nodev1"; 


service NodeService {  
  rpc GetNodeAttestationToken (GetNodeAttestationTokenRequest) returns (GetNodeAttestationTokenResponse) {}
}  

message GetNodeAttestationTokenRequest {
    string nonce = 1;
}

message GetNodeAttestationTokenResponse {
  string uuid = 1;
  string token = 2;
}
