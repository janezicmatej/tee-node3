variables:
    GOLANG_VERSION: "1.24.4"
    GOLINT_VERSION: "v2.0.2"
    COVERAGE_FILE: "coverage.out"
    COBERTURA_FILE: "coverage.xml"

.gocache:
    variables:
        GOPATH: ${CI_PROJECT_DIR}/.go
    before_script:
        - mkdir -p ${GOPATH}
    cache:
        paths:
            - ${GOPATH}/pkg/mod/
            - ${GOPATH}/bin

build:
    stage: build
    image: golang:${GOLANG_VERSION}
    extends: .gocache
    needs: []
    script:
        - go mod download
        - go build ./cmd/main.go

lint:
    stage: test
    needs: [build]
    image: golangci/golangci-lint:${GOLINT_VERSION}
    extends: .gocache
    script:
        - "! gofmt -l . | grep -q ."
        - golangci-lint run --timeout 5m0s

test:
    stage: test
    image: golang:${GOLANG_VERSION}
    needs: [build]
    extends: .gocache
    before_script:
        - go get github.com/boumenot/gocover-cobertura
    script:
        - go test -v -coverpkg=github.com/flare-foundation/tee-node/... -coverprofile=${COVERAGE_FILE} -covermode count ./internal/... ./pkg/...
        - go tool cover -func=${COVERAGE_FILE}
        - go run github.com/boumenot/gocover-cobertura < ${COVERAGE_FILE} > ${COBERTURA_FILE}
    artifacts:
        paths:
            - ${COVERAGE_FILE}
        reports:
            coverage_report:
                coverage_format: cobertura
                path: ${COBERTURA_FILE}
    coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'

stages:
  - build
  - test
  - release-images

.rules:release:
  rules:
    - if: $CI_COMMIT_TAG

#### RELEASE IMAGE #############################################################
release-images:auth:
  stage: release-images
  extends:
    - .rules:release
  image: registry.gitlab.com/flarenetwork/infra-public/pipeliner/pipeliner-stbl:v1.1.0
  id_tokens:
    OIDC_JOB_TOKEN:
      aud: https://gitlab.com
  variables:
    GCP_PROJECT: "flare-network-shared"
    GCP_PROJECT_NUMBER: "940168819002"
  before_script:
    - >-
      WORKLOAD_IDENTITY_POOL=$([ "$CI_COMMIT_REF_PROTECTED" == "true" ] &&
      echo "cr-oidc-gitlab-protected-pool" ||
      echo "cr-oidc-gitlab-pool")
    - >-
      WORKLOAD_IDENTITY_POOL_PROVIDER=$([ "$CI_COMMIT_REF_PROTECTED" == "true" ] &&
      echo "oidc-gitlab-protected" ||
      echo "oidc-gitlab-pool-provider")
    - >-
      SERVICE_ACCOUNT_EMAIL=$([ "$CI_COMMIT_REF_PROTECTED" == "true" ] &&
      echo "cr-prtctd-oidc-cntnr-img-bldr@flare-network-shared.iam.gserviceaccount.com" ||
      echo "cr-oidc-cntnr-img-bldr@flare-network-shared.iam.gserviceaccount.com")
    - . pipeliner gcloud-setup
  script:
    - echo "GOOGLE_OAUTH_ACCESS_TOKEN=$GOOGLE_OAUTH_ACCESS_TOKEN" > auth.env
  artifacts:
    reports:
      dotenv:
        - auth.env

release-images:
  stage: release-images
  extends:
    - .rules:release
  needs:
    - job: release-images:auth
      artifacts: true
  image:
    name: registry.gitlab.com/flarenetwork/infra-public/pipeliner/kaniko-executor-stbl:v1.23.2-debug
    entrypoint: [""]
  variables:
    DOCKERFILE: "Dockerfile"
    IMAGE: "tee-node"
  before_script:
    - mkdir -p /kaniko/.docker
    - auth_encoded=$(echo -n "oauth2accesstoken:$GOOGLE_OAUTH_ACCESS_TOKEN" | base64 | tr -d "\n")
    - echo "{\"auths\":{\"europe-west1-docker.pkg.dev\":{\"auth\":\"$auth_encoded\",\"email\":\"not@val.id\"}}}" > /kaniko/.docker/config.json
  script:
    - >-
      image_tag=$CI_COMMIT_TAG
    - echo "Will tag images with \`$image_tag\`."
    - >-
      args="--context ${CI_PROJECT_DIR}/.
        --dockerfile ${CI_PROJECT_DIR}/${DOCKERFILE}
        --cache=true
        --registry-mirror mirror.gcr.io
        --destination europe-west1-docker.pkg.dev/flare-network-staging/containers/${IMAGE}:$image_tag"
    - >-
      if [[ $CI_COMMIT_REF_PROTECTED == "true" ]]; then
        args="$args --destination europe-west1-docker.pkg.dev/flare-network-production/containers/${IMAGE}:$image_tag"
      fi
    - /kaniko/executor $args

